<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <title>CIS Level 4 — 3D Navigator</title>
  <link rel="stylesheet" href="https://assets.web.digistorm.io/fonts/cis-sg-04-129/font.css">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #0d1117;
      overflow: hidden;
      font-family: "Theinhardt", -apple-system, BlinkMacSystemFont, "Helvetica Neue",
                   "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #e6edf3;
    }
    #canvas-container { position: fixed; inset: 0; }
    canvas { display: block; }

    #ui-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    #ui-overlay > * { pointer-events: auto; }

    #topbar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      padding-top: max(12px, env(safe-area-inset-top));
      background: linear-gradient(to bottom, rgba(13,17,23,0.92) 0%, rgba(13,17,23,0.0) 100%);
      backdrop-filter: blur(6px);
    }
    #title-group {
      display: flex; align-items: center; gap: 10px; min-width: 0;
    }
    #cis-logo {
      height: 24px;
      flex-shrink: 0;
    }
    #title-sep { color: rgba(230,237,243,0.4); font-size: 20px; font-weight: 300; }
    #topbar h1 {
      font-size: 16px; font-weight: 700; letter-spacing: 0.3px;
      color: #e6edf3;
      white-space: nowrap;
    }
    #floor-badge {
      font-size: 11px; font-weight: 600;
      color: rgba(230,237,243,0.85);
      background: rgba(88,166,255,0.15);
      border: 1px solid rgba(88,166,255,0.3);
      padding: 2px 8px; border-radius: 4px;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    /* Bottom route pills */
    #route-summary {
      position: absolute;
      bottom: 24px;
      bottom: calc(24px + env(safe-area-inset-bottom));
      left: 12px; right: 12px;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px;
      background: rgba(13,17,23,0.85);
      border: 1px solid #30363d;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .summary-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      background: rgba(22,27,34,0.9);
      border: 1px solid #30363d;
      border-radius: 12px;
      cursor: pointer;
      flex: 1; min-width: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .summary-pill:hover, .summary-pill:active {
      background: rgba(48,54,61,0.95);
      border-color: #58a6ff;
    }
    .pill-icon {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      line-height: 0;
    }
    .pill-label {
      font-size: 11px; color: #8b949e;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 600;
    }
    .pill-value {
      font-size: 14px; color: #e6edf3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; min-width: 0;
    }
    .pill-value.placeholder { color: #6e7681; }
    #btn-swap {
      flex-shrink: 0;
      width: 32px; height: 32px;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: rgba(22,27,34,0.9);
      color: #8b949e;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #btn-swap:hover { background: rgba(48,54,61,0.95); color: #e6edf3; }

    /* Full-screen location panel */
    #location-panel {
      position: fixed; inset: 0; z-index: 100;
      background: #0d1117;
      display: flex; flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #location-panel.panel-hidden {
      transform: translateY(100%);
      pointer-events: none;
    }
    #panel-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px;
      padding-top: max(10px, env(safe-area-inset-top));
      border-bottom: 1px solid #30363d;
      background: #0d1117;
      flex-shrink: 0;
    }
    #panel-back {
      width: 36px; height: 36px;
      border: none; background: none;
      font-size: 20px; color: #e6edf3;
      cursor: pointer; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    #panel-back:hover { background: rgba(48,54,61,0.6); }
    #panel-search {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #161b22;
      font-size: 16px;
      color: #e6edf3;
      outline: none;
      font-family: inherit;
    }
    #panel-search:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 2px rgba(88,166,255,0.25);
      background: #0d1117;
    }
    #panel-search::placeholder { color: #6e7681; }
    #panel-title {
      padding: 12px 16px 8px;
      font-size: 14px; font-weight: 700;
      color: #e6edf3;
      background: #0d1117;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    #panel-list {
      flex: 1; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
    .loc-group-header {
      padding: 10px 16px 8px 13px;
      font-size: 12px; font-weight: 700;
      color: #58a6ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: sticky; top: 0;
      background: #161b22;
      z-index: 1;
      border-bottom: 1px solid #30363d;
      border-left: 3px solid #58a6ff;
    }
    .loc-item {
      display: block; width: 100%;
      text-align: left;
      padding: 14px 16px;
      border: none; background: none;
      font-size: 15px;
      color: #e6edf3;
      cursor: pointer;
      border-bottom: 1px solid #21262d;
      font-family: inherit;
    }
    .loc-item:hover, .loc-item:active {
      background: rgba(88,166,255,0.08);
    }
    .loc-item.current-value {
      color: #58a6ff;
      font-weight: 600;
    }

    #loading-screen {
      position: fixed; inset: 0; z-index: 200;
      background: #0d1117;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.8s;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    #loading-screen h2 { color: #e6edf3; font-size: 18px; margin-bottom: 12px; font-weight: 600; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .portal-label {
      color: #c9d1d9; font-size: 10px; font-family: inherit;
      background: rgba(13,17,23,0.7); padding: 2px 6px;
      border-radius: 3px; white-space: nowrap; pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <h2>Building 3D Campus…</h2>
</div>

<div id="canvas-container"></div>

<div id="ui-overlay">
  <header id="topbar">
    <div id="title-group">
      <img id="cis-logo" src="../assets/img/cis-logo-white.svg" alt="CIS" height="24">
      <span id="title-sep">|</span>
      <h1>3D Navigator</h1>
      <span id="floor-badge">Level 4 Demo</span>
    </div>
  </header>

  <div id="route-summary">
    <div class="summary-pill" id="pill-start" data-target="start">
      <span class="pill-icon"><svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="#3fb950" stroke="#0d1117" stroke-width="1.5"/><circle cx="6" cy="6" r="2" fill="#0d1117"/></svg></span>
      <span class="pill-label">From</span>
      <span class="pill-value placeholder" id="pill-start-value">Tap to select</span>
    </div>
    <button id="btn-swap" title="Swap">⇆</button>
    <div class="summary-pill" id="pill-dest" data-target="dest">
      <span class="pill-icon"><svg width="10" height="16" viewBox="0 0 10 16"><path d="M5 15C3.5 11.5 0 9 0 5a5 5 0 0 1 10 0c0 4-3.5 6.5-5 10Z" fill="#58a6ff"/><circle cx="5" cy="5" r="2" fill="#0d1117"/></svg></span>
      <span class="pill-label">To</span>
      <span class="pill-value placeholder" id="pill-dest-value">Tap to select</span>
    </div>
  </div>

  <div id="location-panel" class="panel-hidden">
    <div id="panel-header">
      <button id="panel-back" aria-label="Back">←</button>
      <input id="panel-search" type="text" placeholder="Search locations…" autocomplete="off">
    </div>
    <div id="panel-title">Select starting point</div>
    <div id="panel-list"></div>
  </div>
</div>

<script src="lib/three.min.js"></script>
<script src="lib/OrbitControls.js"></script>
<script src="lib/EffectComposer.js"></script>
<script src="lib/RenderPass.js"></script>
<script src="lib/UnrealBloomPass.js"></script>
<script src="lib/ShaderPass.js"></script>
<script src="lib/LuminosityHighPassShader.js"></script>
<script src="lib/CopyShader.js"></script>
<script src="lib/CSS2DRenderer.js"></script>
<script src="../js/shared.js"></script>
<script src="main.js"></script>

</body>
</html>
