<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#DA291C">
  <title>CIS MAP</title>
  <link rel="stylesheet" href="https://assets.web.digistorm.io/fonts/cis-sg-04-129/font.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- Top Bar -->
    <header id="topbar">
      <div id="title-group">
        <img id="cis-logo" src="assets/img/cis-logo-white.svg" alt="CIS" height="22">
        <span id="title-sep">|</span>
        <h1 id="app-title">MAP</h1>
        <span id="floor-badge">Level 4 Demo</span>
      </div>
      <div id="lang-wrap">
        <button id="btn-lang" aria-label="Language">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </button>
        <div id="lang-dropdown" class="dropdown-hidden">
          <button class="lang-option active" data-lang="en">English</button>
          <button class="lang-option" data-lang="zh">中文</button>
        </div>
      </div>
    </header>

    <!-- Canvas Area -->
    <div id="canvas-wrap">
      <canvas id="mapcanvas"></canvas>
      <div id="loading">
        <div class="spinner"></div>
        <span id="loading-text">Loading map...</span>
      </div>
    </div>

    <!-- Bottom Controls -->
    <div id="controls">
      <div id="route-summary">
        <div class="summary-pill" id="pill-start" data-target="start">
          <span class="pill-icon"><svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="#4285F4" stroke="#fff" stroke-width="1.5"/><circle cx="6" cy="6" r="2" fill="#fff"/></svg></span>
          <span class="pill-label" id="label-start">From</span>
          <span class="pill-value placeholder" id="pill-start-value">Tap to select</span>
        </div>
        <button id="btn-swap" title="Swap">⇆</button>
        <div class="summary-pill" id="pill-dest" data-target="dest">
          <span class="pill-icon"><svg width="10" height="16" viewBox="0 0 10 16"><path d="M5 15C3.5 11.5 0 9 0 5a5 5 0 0 1 10 0c0 4-3.5 6.5-5 10Z" fill="#DA291C"/><circle cx="5" cy="5" r="2" fill="#fff"/></svg></span>
          <span class="pill-label" id="label-dest">To</span>
          <span class="pill-value placeholder" id="pill-dest-value">Tap to select</span>
        </div>
      </div>
      <div id="status"></div>
    </div>
  </div>

  <!-- Full-screen location picker -->
  <div id="location-panel" class="panel-hidden">
    <div id="panel-header">
      <button id="panel-back" aria-label="Back">←</button>
      <input id="panel-search" type="text" placeholder="Search locations..." autocomplete="off">
      <button id="panel-clear-search" aria-label="Clear">✕</button>
    </div>
    <div id="panel-title">Select starting point</div>
    <div id="panel-list"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
